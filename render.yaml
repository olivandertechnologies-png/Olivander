services:
  - type: web
    name: olivander-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    branch: main
    healthCheckPath: /health
    envVars:
      - key: RENDER
        value: "true"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: BACKEND_ORIGIN
        value: https://olivander.onrender.com
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: PUBSUB_TOPIC
        value: projects/olivandertechnologies/topics/gmail-watch
